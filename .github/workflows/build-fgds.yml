name: FGD Build
on:
  push:
    branches: [ main ]
    paths:
      - 'fgd/**'
  workflow_dispatch:
    # Allow triggering manually whenever it's useful.

permissions:
  contents: read
  pull-requests: read

jobs:
  build-fgds:
    runs-on: ubuntu-latest
    name: Build FGDs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'main'
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      - name: Install srctools
        run: python -m pip install -r requirements.txt
      - name: FGD build and folder copy
        run: bash ./build.sh all
      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: ./build/*.fgd
          if-no-files-found: error
  build-engine:
    runs-on: ubuntu-latest
    name: Build Engine Dump
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      - name: Install srctools
        run: python -m pip install -r requirements.txt
      - name: FGD engine dump
        run: python src/hammeraddons/unify_fgd.py exp --engine --binary -o fgd.lzma
      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: build-engine-${{ github.sha }}
          path: fgd.lzma
          if-no-files-found: error

  create-release:

    runs-on: ubuntu-latest
    name: Create Release
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - run: git fetch --tags origin
      
      - name: Get previous tag
        id: previoustag
        uses: 'actions-ecosystem/action-get-latest-tag@v1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Next Monotonic Release version
        id: next
        uses: actions-ecosystem/action-bump-semver@v1
        with:
          current_version: ${{ steps.previoustag.outputs.tag }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloads/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: ${{ github.event.inputs.version == '' }}
        with:
          tag_name: ${{ steps.next.outputs.new_version }}
          generate_release_notes: true
          previous_tag: ${{ steps.previoustag.outputs.tag }}
          files: ./downloads/*